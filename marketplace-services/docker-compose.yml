version: '3.8'

networks:
  internal:
    driver: bridge
    internal: false

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/marketplace/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/marketplace/redis
  ssl_certs:
  nginx_logs:

services:
  # =============================================
  # POSTGRESQL + POSTGIS
  # =============================================
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: marketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-marketplace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_very_secure_2026}
      POSTGRES_DB: ${DB_NAME:-marketplace}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 10s
      retries: 15
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # =============================================
  # REDIS
  # =============================================
  redis:
    image: redis:7.2-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2026}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================
  # BACKEND API
  # =============================================
  backend:
    build: ./backend
    container_name: marketplace_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-marketplace}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_very_secure_2026}
      DB_NAME: ${DB_NAME:-marketplace}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass_2026}
      JWT_SECRET: ${JWT_SECRET:-super_secure_jwt_key_change_me_in_production}
      APP_URL: ${APP_URL:-https://marketplace.internal.lab}
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # =============================================
  # FRONTEND WEB
  # =============================================
  frontend:
    build: ./frontend
    container_name: marketplace_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_URL:-https://marketplace.internal.lab}/api
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================
  # NGINX REVERSE PROXY
  # =============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: marketplace_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ssl_certs:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
